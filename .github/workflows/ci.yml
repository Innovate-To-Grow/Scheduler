name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --workspace=backend
      - run: npm --workspace=backend run format:check
      - run: npm --workspace=backend run lint
      - run: npm --workspace=backend run test -- --ci

  frontend-lint-test-build:
    name: Frontend - Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --workspace=frontend
      - run: npm --workspace=frontend run format:check
      - run: npm --workspace=frontend run lint
      - run: npm --workspace=frontend run test -- --ci
      - run: npm --workspace=frontend run build

  docker-build-check:
    name: Docker Build - ${{ matrix.service }}
    needs: [backend-lint-test, frontend-lint-test-build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        service: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          load: false
          tags: scheduler-${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
