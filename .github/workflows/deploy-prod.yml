name: AWS ECS - Prod

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write
  contents: read
  actions: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: AWS ECS - Prod
    runs-on: ubuntu-latest
    environment: prod
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'scheduler-prod' }}
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout code at tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (static secrets)
        if: ${{ vars.AWS_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare Terraform backend
        id: backend
        run: |
          set +e
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_BUCKET="scheduler-prod-tfstate-${ACCOUNT_ID}"
          LOCK_TABLE="scheduler-prod-terraform-locks"
          BACKEND_MODE="remote"

          if ! aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$STATE_BUCKET" --region "${AWS_REGION}" || BACKEND_MODE="local"
            else
              aws s3api create-bucket --bucket "$STATE_BUCKET" --region "${AWS_REGION}" \
                --create-bucket-configuration LocationConstraint="${AWS_REGION}" || BACKEND_MODE="local"
            fi
          fi

          if [ "$BACKEND_MODE" = "remote" ]; then
            aws s3api put-bucket-versioning --bucket "$STATE_BUCKET" \
              --versioning-configuration Status=Enabled || BACKEND_MODE="local"
            aws s3api put-bucket-encryption --bucket "$STATE_BUCKET" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}' || BACKEND_MODE="local"
            aws s3api put-public-access-block --bucket "$STATE_BUCKET" \
              --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true || BACKEND_MODE="local"
          fi

          if [ "$BACKEND_MODE" = "remote" ]; then
            if ! aws dynamodb describe-table --table-name "$LOCK_TABLE" >/dev/null 2>&1; then
              aws dynamodb create-table \
                --table-name "$LOCK_TABLE" \
                --attribute-definitions AttributeName=LockID,AttributeType=S \
                --key-schema AttributeName=LockID,KeyType=HASH \
                --billing-mode PAY_PER_REQUEST || BACKEND_MODE="local"
              if [ "$BACKEND_MODE" = "remote" ]; then
                aws dynamodb wait table-exists --table-name "$LOCK_TABLE" || BACKEND_MODE="local"
              fi
            fi
          fi

          if [ "$BACKEND_MODE" = "local" ]; then
            echo "Using local Terraform backend fallback (S3/DynamoDB backend unavailable)."
          fi

          echo "backend_mode=$BACKEND_MODE" >> "$GITHUB_OUTPUT"
          echo "state_bucket=$STATE_BUCKET" >> "$GITHUB_OUTPUT"
          echo "lock_table=$LOCK_TABLE" >> "$GITHUB_OUTPUT"
          set -e

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init (remote backend)
        if: ${{ steps.backend.outputs.backend_mode == 'remote' }}
        run: |
          terraform -chdir=infra/prod init -reconfigure -input=false \
            -backend-config="bucket=${{ steps.backend.outputs.state_bucket }}" \
            -backend-config="dynamodb_table=${{ steps.backend.outputs.lock_table }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform init (local backend fallback)
        if: ${{ steps.backend.outputs.backend_mode == 'local' }}
        run: |
          perl -0777 -i -pe 's/\n\s*backend \"s3\" \{\}\n/\n/s' infra/prod/versions.tf
          terraform -chdir=infra/prod init -reconfigure -input=false

      - name: Ensure ECR repository exists
        run: |
          if ! aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1; then
            aws ecr create-repository \
              --repository-name "$ECR_REPOSITORY" \
              --image-scanning-configuration scanOnPush=true
          fi

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"

          docker build -t "$IMAGE_URI:${DEPLOY_SHA}" -t "$IMAGE_URI:prod-latest" .
          docker push "$IMAGE_URI:${DEPLOY_SHA}"
          docker push "$IMAGE_URI:prod-latest"

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Terraform apply
        id: tf
        run: |
          terraform -chdir=infra/prod apply -auto-approve -input=false \
            -var="aws_region=${AWS_REGION}" \
            -var="image_tag=${DEPLOY_SHA}" \
            -var="ecr_repository_name=${ECR_REPOSITORY}" \
            -var="github_repository=${GITHUB_REPOSITORY}"

          echo "alb_dns=$(terraform -chdir=infra/prod output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$(terraform -chdir=infra/prod output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "service_name=$(terraform -chdir=infra/prod output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"

      - name: Wait for ECS stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ steps.tf.outputs.cluster_name }}" \
            --services "${{ steps.tf.outputs.service_name }}"

      - name: Smoke test
        run: |
          curl --fail --show-error --retry 10 --retry-delay 5 "http://${{ steps.tf.outputs.alb_dns }}/api/health"
          curl --fail --show-error --retry 10 --retry-delay 5 "http://${{ steps.tf.outputs.alb_dns }}/"
